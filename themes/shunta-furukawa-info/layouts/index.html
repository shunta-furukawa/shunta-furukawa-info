{{ define "main" }}

<section class="hero-container">
  <div class="hero-logo">
    <img src="/images/logo.jpg" alt="Shunta Furukawa Logo">
  </div>
  <div class="hero-text">
    <h1>こんにちは、<span class="name">{{ site.Params.author }}</span> です。</h1>
    <p>{{ site.Params.description | safeHTML }}</p>
  </div>
  <div class="social-links">
    {{ partial "social_links.html" . }}
  </div>
</section>

<section class="skill-container">
  <h1>スキルセット</h1>
  <div class="story-link">
    <a href="/story/" class="button">スキルの裏側にある物語を知る → </a>
  </div>
  {{ range sort hugo.Data.skills "weight" }}
  {{ partial "skill_section.html" . }}
  {{ end }}
</section>

{{ end }}
