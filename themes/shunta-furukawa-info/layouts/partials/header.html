        <!-- ロゴ -->
        <div class="logo">
            <a href="/">
                <img src="/images/logo.jpg" alt="Logo" />
            </a>
        </div>

        <!-- ハンバーガーメニューアイコン -->
        <div class="menu-toggle" id="menu-toggle">
            <span></span>
            <span></span>

        </div>

            {{ partial "social_links.html" . }}
        </div>
    </div>
</div>
