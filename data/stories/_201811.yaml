title: "動画広告の配信基盤を開発する会社"
period: "2018年11月 ～ 現在"
descriptions:
  - 入社当初は広告業務領域のディレクションと自動化推進を担当し、営業・運用・開発の橋渡し役として要件整理、進行管理、業務プロセス改善に取り組みました。申込・入稿・ターゲティング領域のリリースや継続的なオペレーション改善を通じて、広告運用業務の品質向上に貢献しています。
  - その後、広告配信システムのエンジニアリング領域へ軸足を移し、認証認可基盤の設計、DSP のコンソール系 API、レポート出力基盤、在庫拡大やリーチ改善施策など、バックエンドからインフラまで幅広く担当。単機能の実装に留まらず、保守性・拡張性・運用性を見据えた設計を意識してきました。
  - 近年は、大規模配信案件や会員向け広告配信など新領域の立ち上げを推進するとともに、広告配信基盤の負荷対策、キャパシティプランニング、CI/CD および IaC への移行、インシデントの再発防止策の仕組み化、ドキュメント基盤整備まで横断的に担当。事業要件を実装と運用に落とし込む推進力を磨いてきました。
image: "/images/experience_201811.svg"
connection: "作る側から、測る側へ。配信基盤の設計・運用を軸足に、「広告は本当に効いているのか」という問いと、AI による分析の自動化へ関心を広げている。いま書いているのは、この現在進行形の学び。"
skills:
  - Golang
  - Kubernetes
  - Terraform
  - GCP / AWS
  - 広告配信システム設計・運用
  - 認証認可基盤
  - レポート出力基盤
  - 大規模配信案件対応
  - 負荷試験・キャパシティプランニング
  - CI/CD・IaC 移行
  - プロダクトマネジメント
