title: "モバイルアプリ開発のベンチャー企業"
period: "2009年12月 ～ 2013年6月"
descriptions:
  - スマートフォンが普及し始めた時期に、モバイルアプリの可能性に魅力を感じてベンチャー企業に参画。最初に担当したのは、既にヒットしていたアプリの続編としてリリースされたネットワーク対応ゲームの画面設計と機能デザインでした。
  - このプロジェクトでは、アプリの見た目だけでなく、ゲーム体験全体を設計する責任を担い、ヒット作にふさわしい完成度を目指しました。
  - 同時期に、新たなネットワーク対応のアプリケーションプラットフォーム開発にも参加。世界中のユーザーが利用することを目標に、デザインと UI/UX 設計を担当しました。社内でも重点案件の一つと位置付けられ、責任感を持って取り組みました。
  - 結果として、このプラットフォームは数千万規模のユーザーに支持され、モバイルアプリ業界にも影響を与える製品となりました。
  - さらに、受託案件ではエンタメIPコラボアプリや業務支援アプリなど、多岐にわたるプロジェクトを担当。エンタメ IP を題材としたゲームの UI デザインでは、ファンの没入感を得られるよう細部にまでこだわり、業務支援アプリでは制約の多い中で最大限の機能とデザインを両立させる工夫を重ねました。チームリーダーとしての役割も徐々に増え、プロジェクト管理やメンバー間の調整、進捗管理なども担当。デザインだけでなく、プロジェクト全体を俯瞰する能力を磨きました。
image: "/images/experience_200912.svg"
skills:
  - モバイルアプリ開発
  - プロジェクトマネジメント
  - グラフィックデザイン
  - HTML
  - CSS (Sass, Tailwind CSS)
