name: Lighthouse CI

on:
  pull_request:
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: lighthouse-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: 'latest'
          extended: true

      - name: Build (localhost baseURL)
        run: hugo --minify --baseURL http://localhost:8080/

      - name: Serve build output
        run: python3 -m http.server -d public 8080 &

      - name: Wait for server
        run: |
          for i in {1..10}; do
            curl -sf http://localhost:8080/ >/dev/null && break
            sleep 1
          done

      - name: Run Lighthouse
        uses: treosh/lighthouse-ci-action@v12
        with:
          urls: |
            http://localhost:8080/
            http://localhost:8080/story/
            http://localhost:8080/writings/
          configPath: ./.lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
